<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Traefik Request Processing Pipeline</title>
  <desc id="desc">Client request flows through EntryPoint, Router, Middlewares, and Service, then reaches backend servers.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #0f172a; }
      .node-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #0f172a; }
      .node-sub { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #334155; }
      .backend-title { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #0f172a; }
      .box { rx: 14; ry: 14; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .branch { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="44" y="42" class="title">Traefik Request Processing Pipeline</text>

  <rect x="40" y="120" width="180" height="90" class="box" fill="#e0f2fe" stroke="#0284c7" />
  <text x="130" y="158" text-anchor="middle" class="node-title">Client</text>
  <text x="130" y="182" text-anchor="middle" class="node-sub">Incoming request</text>

  <rect x="280" y="120" width="220" height="90" class="box" fill="#ede9fe" stroke="#7c3aed" />
  <text x="390" y="158" text-anchor="middle" class="node-title">EntryPoint</text>
  <text x="390" y="182" text-anchor="middle" class="node-sub">:80 / :443</text>

  <rect x="560" y="120" width="260" height="90" class="box" fill="#dcfce7" stroke="#16a34a" />
  <text x="690" y="158" text-anchor="middle" class="node-title">Router</text>
  <text x="690" y="182" text-anchor="middle" class="node-sub">Host/Path/Header matching</text>

  <rect x="880" y="120" width="260" height="90" class="box" fill="#fef3c7" stroke="#d97706" />
  <text x="1010" y="158" text-anchor="middle" class="node-title">Middlewares</text>
  <text x="1010" y="182" text-anchor="middle" class="node-sub">Auth / Rewrite / Limits</text>

  <rect x="1200" y="120" width="180" height="90" class="box" fill="#fee2e2" stroke="#dc2626" />
  <text x="1290" y="158" text-anchor="middle" class="node-title">Service</text>
  <text x="1290" y="182" text-anchor="middle" class="node-sub">Load balancing</text>

  <rect x="1120" y="258" width="120" height="62" class="box" fill="#f8fafc" stroke="#64748b" />
  <text x="1180" y="296" text-anchor="middle" class="backend-title">Backend A</text>

  <rect x="1260" y="258" width="120" height="62" class="box" fill="#f8fafc" stroke="#64748b" />
  <text x="1320" y="296" text-anchor="middle" class="backend-title">Backend B</text>

  <line x1="220" y1="165" x2="280" y2="165" class="line" />
  <line x1="500" y1="165" x2="560" y2="165" class="line" />
  <line x1="820" y1="165" x2="880" y2="165" class="line" />
  <line x1="1140" y1="165" x2="1200" y2="165" class="line" />

  <line x1="1290" y1="210" x2="1180" y2="258" class="branch" />
  <line x1="1290" y1="210" x2="1320" y2="258" class="branch" />
</svg>
